version: '3.8'

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-admin-bot2
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./src:/app
      - ./.ssh:/app/.ssh
    ports:
      - "8000:8000" # Если требуется доступ через вебхуки
    command: python bot.py

  mattermost-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mattermost-admin-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./src:/app
      - ./.ssh:/app/.ssh
    ports:
      - "${MM_WEBHOOK_PORT:-8065}:${MM_WEBHOOK_PORT:-8065}"
    command: python mattermost_bot.py
